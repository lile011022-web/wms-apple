name: Build Production Images

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to publish
        required: true
        default: latest

permissions:
  contents: read
  packages: write

jobs:
  build-images:
    name: Build and push web/api images
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api:${{ inputs.image_tag }}
            ghcr.io/${{ github.repository }}/api:${{ github.sha }}
          cache-from: type=gha,scope=wms-api
          cache-to: type=gha,mode=max,scope=wms-api

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          build-args: |
            VITE_API_BASE_URL=/api/v1
          tags: |
            ghcr.io/${{ github.repository }}/web:${{ inputs.image_tag }}
            ghcr.io/${{ github.repository }}/web:${{ github.sha }}
          cache-from: type=gha,scope=wms-web
          cache-to: type=gha,mode=max,scope=wms-web
