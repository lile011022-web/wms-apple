services:
  web:
    image: ${WEB_IMAGE}
    container_name: wms-scan-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - '80:80'
    networks:
      - wms_internal

  api:
    image: ${API_IMAGE}
    container_name: wms-scan-api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      API_PORT: ${API_PORT:-3000}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://wms.example.com}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_SECRET: ${JWT_SECRET:-change_me}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - '3000'
    volumes:
      - ./uploads:/app/apps/api/uploads
    networks:
      - wms_internal

  postgres:
    image: postgres:16-alpine
    container_name: wms-scan-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-wms_scan}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wms_internal

  redis:
    image: redis:7-alpine
    container_name: wms-scan-redis-prod
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wms_internal

networks:
  wms_internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
