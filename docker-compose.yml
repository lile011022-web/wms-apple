services:
  postgres:
    image: postgres:16-alpine
    container_name: wms-scan-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: wms_scan
      POSTGRES_USER: wms_scan
      POSTGRES_PASSWORD: wms_scan_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wms_scan -d wms_scan"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wms-scan-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
